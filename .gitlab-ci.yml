stages:   # List of stages for jobs, abd their order of execution
  - test

test-playwright:  # This job runs in the test stage
  image: mcr.microsoft.com/playwright:v1.61.0-noble
  stage: test  # It only starts when the job in the build stage completes succesfully
 
  script:
    - npm ci
    - npx playwright install --with-deps
    - npx playwright test

  artifacts:
    when: always
    paths:
      - playwright-report/**
